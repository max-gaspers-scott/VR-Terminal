<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR Terminal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background: #0a0a0a;
      color: #00ff00;
      overflow: hidden;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.9);
      padding: 40px;
      border-radius: 10px;
      border: 2px solid #00ff00;
    }

    #loading h1 {
      font-size: 2em;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #00ff00;
    }

    #loading p {
      font-size: 1.2em;
      margin-bottom: 10px;
    }

    #loading .spinner {
      border: 4px solid #333;
      border-top: 4px solid #00ff00;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border-radius: 5px;
      font-size: 14px;
      border: 1px solid #00ff00;
      max-width: 400px;
    }

    #info h3 {
      margin-bottom: 10px;
      text-shadow: 0 0 5px #00ff00;
    }

    #info ul {
      list-style: none;
      padding-left: 10px;
    }

    #info li {
      margin-bottom: 5px;
      padding-left: 15px;
      position: relative;
    }

    #info li:before {
      content: "▸";
      position: absolute;
      left: 0;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>VR TERMINAL</h1>
    <div class="spinner"></div>
    <p>Initializing...</p>
    <p style="font-size: 0.9em; margin-top: 20px;">Put on your VR headset and click "Enter VR"</p>
  </div>

  <div id="info">
    <h3>Controls:</h3>
    <ul>
      <li>Use physical keyboard to type directly</li>
      <li>OR point VR controller at virtual keyboard</li>
      <li>Press trigger to select keys</li>
      <li>Ctrl+C, Ctrl+D, and other combos work</li>
      <li>Full ANSI color support enabled</li>
    </ul>
  </div>

  <!-- Load Socket.io client -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- Load xterm.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>

  <!-- Load main application as ES module -->
  <script type="module" src="app.js"></script>

  <script>
    // Hide loading screen after a delay
    setTimeout(() => {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.style.transition = 'opacity 0.5s';
        loading.style.opacity = '0';
        setTimeout(() => loading.remove(), 500);
      }
    }, 2000);
  </script>
</body>
</html>
